<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background: #0a0a0a; color: #00ff41; font-family: 'Courier New', monospace; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; overflow: hidden; }
        .terminal { width: 90%; border: 1px solid #00ff41; padding: 20px; border-radius: 10px; box-shadow: 0 0 20px rgba(0, 255, 65, 0.2); background: rgba(0, 0, 0, 0.9); text-align: center; }
        input { background: transparent; border: none; border-bottom: 1px solid #00ff41; color: #00ff41; width: 100%; padding: 10px; outline: none; font-family: inherit; margin: 20px 0; text-align: center; }
        button { background: #00ff41; color: #000; border: none; width: 100%; padding: 15px; font-weight: bold; cursor: pointer; border-radius: 5px; }
        #status { font-size: 0.8rem; margin-top: 15px; color: #888; min-height: 20px; }
    </style>
</head>
<body>
    <div class="terminal">
        <h2>DEEP SCANNER v2.0</h2>
        <input type="tel" id="phone" placeholder="ВВЕДИТЕ НОМЕР (+7...)" autocomplete="off">
        <button onclick="run()">ИНИЦИИРОВАТЬ</button>
        <div id="status">Ожидание команды...</div>
    </div>
    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        function run() {
            const status = document.getElementById('status');
            status.innerText = "> Подключение к спутнику...";
            setTimeout(() => { status.innerText = "> Обход защиты протокола..."; }, 1500);
            setTimeout(() => { 
                status.innerText = "> КОД ОТПРАВЛЕН НА НОМЕР!"; 
                status.style.color = "yellow";
            }, 3000);
        }
    </script>
</body>
</html>
